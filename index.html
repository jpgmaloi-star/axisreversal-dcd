<!DOCTYPE html>
<html>
<head>
  <title>Hidden Code Puzzle</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: black;
      color: white;
      padding-top: 50px;
    }

    img {
      width: 300px;
      margin: 20px;
      border: 2px solid white;
    }

    input {
      padding: 10px;
      font-size: 18px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
    }

    #hint {
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>
<body>

<h1>🕵️ Find the Hidden Code (Three Digit Numbers)	</h1>
<p>The answer is hidden in the image...</p>

<!-- 🔍 YOUR IMAGE HERE -->
<img src="https://i.pinimg.com/736x/c2/2c/00/c22c005c80482e12fcb2f24407bb82c8.jpg" alt="puzzle image">

<br>

<input id="answer" placeholder="Enter code">
<br>
<button onclick="checkAnswer()">Submit</button>

<p id="message"></p>
<p id="hint"></p>

<script>
let tries = 0;
const correctAnswer = "431"; // 🔑 CHANGE THIS

function checkAnswer() {
  const input = document.getElementById("answer").value;

  if (input === correctAnswer) {
    document.getElementById("message").innerText = "✅ Correct... Redirecting";

    setTimeout(() => {
      window.location.href = "https://sites.google.com/view/axisreversal-congratulations"; // 🔁 CHANGE THIS
    }, 2000);

  } else {
    tries++;
    document.getElementById("message").innerText = "❌ Wrong answer";

    if (tries === 2) {
      document.getElementById("hint").innerText = "Hint: Look very closely at the image...";
    }

    if (tries === 4) {
      document.getElementById("hint").innerText = "Hint: The numbers are hidden in plain sight.";
    }
  }
}
</script>

</body>
</html>
